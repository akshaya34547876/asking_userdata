<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Responses</title>
</head>
<body>
  <h1>Saved Responses</h1>
  <table border="1">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Age</th>
      <th>Channel Name</th>
      <th>Subscribers</th>
      <th>Creation Date</th>
      <th>Country</th>
      <th>Highest View Count</th>
      <th>Service Looking For</th>
    </tr>
    {% for row in rows %}
    <tr>
      <td>{{ row[0] }}</td>
      <td>{{ row[1] }}</td>
      <td>{{ row[2] }}</td>
      <td>{{ row[3] }}</td>
      <td>{{ row[4] }}</td>
      <td>{{ row[5] }}</td>
      <td>{{ row[6] }}</td>
      <td>{{ row[7] }}</td>
      <td>{{ row[8] }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
